<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>JydFasting - History</title>
    <style>
        :root { --bg:#F0F4F8; --surface:#fff; --primary:#5D5FEF; --text:#1E293B; --sub:#64748B; --border:#E2E8F0; }
        * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
        body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--text); display:flex; justify-content:center; }
        .app { width:100%; max-width:450px; background:var(--surface); min-height:100vh; display:flex; flex-direction:column; padding-bottom:80px; }
        
        .page-hdr { padding:40px 20px 20px; }
        .page-title { font-size:1.5rem; font-weight:800; }

        .content-area { padding:0 20px; flex:1; overflow-y:auto; }
        
        .history-item { 
            background:var(--bg); 
            padding:16px; 
            border-radius:16px; 
            margin-bottom:12px; 
            display:flex; 
            justify-content:space-between; 
            align-items:center;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 1px solid transparent;
        }
        .history-item:hover { transform: translateY(-4px); box-shadow: 0 8px 16px rgba(0,0,0,0.05); border-color: var(--primary); }
        .h-info { display:flex; flex-direction:column; gap:2px; }
        .h-date { font-size:0.75rem; color:var(--sub); font-weight:600; }
        .h-plan { font-size:0.9rem; font-weight:800; }
        .h-time { font-size:0.8rem; color:var(--primary); font-weight:700; }

        .nav { position:fixed; bottom:0; width:100%; max-width:450px; background:#fff; border-top:1px solid var(--border); display:flex; justify-content:space-around; padding:12px 0 24px; }
        .nav-item { color:var(--sub); text-decoration:none; display:flex; flex-direction:column; align-items:center; gap:4px; font-size:0.7rem; font-weight:600; transition: all 0.2s ease; }
        .nav-item:hover { color: var(--primary); transform: translateY(-2px); }
        .nav-item.active { color:var(--primary); }
        .nav-item i { font-size:1.1rem; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app">
        <div class="page-hdr">
            <h2 class="page-title">Fasting History</h2>
        </div>

        <div class="content-area">
            <div class="history-item">
                <div class="h-info">
                    <span class="h-date">Today, Oct 24</span>
                    <span class="h-plan">16:8 Fast</span>
                </div>
                <span class="h-time">16h 05m</span>
            </div>
            <div class="history-item">
                <div class="h-info">
                    <span class="h-date">Yesterday, Oct 23</span>
                    <span class="h-plan">18:6 Fast</span>
                </div>
                <span class="h-time">18h 12m</span>
            </div>
            <div class="history-item">
                <div class="h-info">
                    <span class="h-date">Oct 22, 2023</span>
                    <span class="h-plan">OMAD Challenge</span>
                </div>
                <span class="h-time">23h 45m</span>
            </div>
        </div>

        <nav class="nav">
            <a href="fasting-index.html" class="nav-item">
                <i class="fas fa-clock"></i>
                <span>Fast</span>
            </a>
            <a href="fasting-plans.html" class="nav-item">
                <i class="fas fa-fire"></i>
                <span>Plans</span>
            </a>
            <a href="fasting-food.html" class="nav-item">
                <i class="fas fa-utensils"></i>
                <span>Food</span>
            </a>
            <a href="fasting-history.html" class="nav-item active">
                <i class="fas fa-calendar-alt"></i>
                <span>History</span>
            </a>
        </nav>
    </div>
</body>
</html>
